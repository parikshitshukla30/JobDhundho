<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">

    <title>Dashboard</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial;
        }

        body {
            background-color: #2872A1;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* SIDEBAR */

        .sidebar {
            width: 22%;
            background-color: #043d61;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2%;
            transition: .3s;
            justify-content: space-between;
            position: relative;
        }

        .close {
            display: none;
            font-size: 30px;
            cursor: pointer;
            align-self: flex-end;

        }

        .sidebar div {
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        .sidebar a,
        .sidebar button {

            width: 90%;
            padding: 4%;
            margin: 3%;
            text-align: center;
            text-decoration: none;
            background: aliceblue;
            color: #2872A1;
            border: none;
            border-radius: 8px;
        }

        img {

            width: 40%;
            margin-left: 30%;
            margin-bottom: 20px;
            border-radius: 10px;

        }


        /* MAIN */

        .main {
            width: 78%;
        }

        .header {
            height: 60px;
            display: flex;
            align-items: center;
            padding-left: 20px;
            gap: 20px;
            background-color: #043d61;
            border-bottom: 2px solid #ddd;
            color: aliceblue;
        }

        .open {
            display: none;
            font-size: 30px;
            cursor: pointer;
        }

        iframe {
            width: 100%;
            height: calc(100vh - 60px);
            border: none;
        }


        /* MOBILE */

        @media(max-width:700px) {

            .container {
                flex-direction: column;
            }

            .sidebar {
                position: absolute;
                left: -100%;
                top: 0;
                width: 70%;
                height: 100%;
                z-index: 10;
            }


            .main {
                width: 100%;
            }

            .open,
            .close {
                display: block;
                color: white;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- SIDEBAR -->
        <div class="sidebar" id="side">
            <!-- CLOSE BUTTON -->
            <div> <span class="close" onclick="
document.getElementById('side').style.left='-100%';
document.getElementById('open').style.display='block';
"> ✕ </span>

                <img
                    src="https://img.freepik.com/premium-vector/jd-luxury-modern-brand-logo_745848-35.jpg">
                <a href="summary.html" target="FRAME">OVERVIEW</a>
                <a href="profile.html" target="FRAME">PROFILE</a>
                <a href="recentadded.html" target="FRAME">RESENT ADDED</a>
                <a href="applicant.html" target="FRAME">APPLICANT</a>
                <a href="interview.html" target="FRAME">INTERVIEW</a>
            </div>
            <a href="../../index.html">Logout</a>
        </div>

        <!-- MAIN -->
        <div class="main">
            <div class="header">
                <!-- OPEN BUTTON -->
                <span id="open" class="open" onclick="
                    document.getElementById('side').style.left='0%';
                    this.style.display='none';
                    "> ☰ </span>
                <h2> Recruiter Dashboard</h2>
            </div>
            <iframe src="summary.html" name="FRAME">
            </iframe>
        </div>
    </div>
</body>

</html>
