<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Profile Page</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #eef3f8;
            padding: 40px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 80%;
            background: aliceblue;
            padding: 5%;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .15);
        }

        .title {
            text-align: center;
            font-size: 35px;
            color: #2872A1;
            margin-bottom: 40px;
        }

        .section {
            margin-bottom: 3%;
        }

        .section h2 {
            padding-bottom: 0.5%;
            margin-bottom: 1%;
            border-bottom: 2px solid #2872A1;
            color: #2872A1;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 2%;
            border: 1px solid #ccc;
            border-radius: 10px;
            font-size: 100%;
        }

        textarea {
            resize: none;
            height: 120px;
        }

        .upload {
            padding: 25px;
            background: #f7f9fc;
            border: 2px dashed #2872A1;
            border-radius: 15px;
            text-align: center;
        }

        .profile-img {
            width: 25%;

            border-radius: 50%;
            margin: auto;
            display: block;
            margin-bottom: 15px;
            border: 5px solid #2872A1;
            object-fit: cover;
        }

        button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            background: #2872A1;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }

        button:hover {
            background: #19557b;
        }

        @media(max-width:600px) {
            .grid {
                grid-template-columns: 1fr;
            }

            .container {
                width: 100%;
                padding: 25px;
            }

            .profile-img {
                width: 75%;
            }
        }
    </style>

</head>

<body>

    <div class="container">
        <h1 class="title"> Profile Page </h1>
        <div class="section">
            <h2> Upload Profile Image </h2>
            <div class="upload">
                <img src="https://img.freepik.com/premium-vector/personal-id-icon-logo-vector-design_810420-795.jpg"
                    class="profile-img">
                <input type="file" accept="image/*">
            </div>
        </div>

        <div class="section">
            <h2> Personal Information </h2>
            <div class="grid">
                <input type="text" placeholder="Name">
                <input type="text" placeholder="Surname">
                <input type="email" placeholder="Email">
                <input type="tel" placeholder="Contact">
            </div>
        </div>

        <div class="section">
            <h2> Work Status </h2>
            <select>
                <option> Student </option>
                <option> Unemployed </option>
                <option> Employed </option>
            </select>
        </div>

        <div class="section">
            <h2> Academic Details ( Optional )</h2>
            <div class="grid">
                <input placeholder="10th : xyz">
                <input placeholder="12th : xyz">
                <input placeholder="UG : xyz">
                <input placeholder="PG : xyz">
            </div>
        </div>

        <div class="section">
            <h2> Skills </h2>
            <textarea placeholder="HTML, CSS, JavaScript"></textarea>
        </div>

        <div class="section">
            <h2> Experience (Optional) </h2>
            <textarea placeholder="A : xyz
B : xyz
C : xyz"></textarea>
        </div>

        <div class="section">
            <h2> Caption / About Me (Optional)</h2>
            <textarea placeholder="Write something about yourself..."></textarea>
        </div>

        <div class="section">
            <h2> Upload CV </h2>
            <div class="upload">
                <input type="file" accept=".pdf,.doc,.docx">
            </div>
        </div>
        <button> Save Profile </button>

    </div>

</body>

</html>
