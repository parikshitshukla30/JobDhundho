<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Interview Schedule</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f3f6fa;
        }

        /* Header */

        .header {
            width: 100%;
            background: #1f3c88;
            color: white;
            padding: 2%;
        }

        .header h1 {
            font-size: 2rem;
        }

        .header p {
            margin-top: 0.5%;
        }

        /* Main */

        .container {
            width: 95%;
            margin: 2% auto;
        }

        /* Summary */

        .summary {
            display: flex;
            flex-wrap: wrap;
            gap: 2%;
        }

        .card {
            flex: 1;
            min-width: 220px;

            background: white;
            padding: 2%;
            border-radius: 12px;

            box-shadow: 0 2px 10px rgba(0, 0, 0, .08);
        }

        .card h2 {
            color: #1f3c88;
        }

        .card p {
            margin-top: 2%;
        }

        /* Interview Cards */

        .section-title {
            margin: 3% 0 2%;
        }

        .interview-box {

            background: white;

            border-left: 8px solid #1f3c88;

            border-radius: 12px;

            padding: 2%;

            margin-bottom: 2%;

            box-shadow: 0 2px 10px rgba(0, 0, 0, .08);

        }

        .top {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
        }

        .company {
            font-size: 1.3rem;
            color: #1f3c88;
        }

        .status {

            padding: 8px 14px;

            border-radius: 20px;

            background: #eaf4ff;

            color: #1565c0;

        }

        .details {

            margin-top: 2%;

            display: grid;

            grid-template-columns:
                repeat(auto-fit, minmax(220px, 1fr));

            gap: 1%;
        }

        .detail {

            background: #f7f8fb;

            padding: 4%;

            border-radius: 8px;

        }

        .actions {

            margin-top: 2%;

        }

        button {

            padding: 10px 18px;

            border: none;

            border-radius: 8px;

            cursor: pointer;

            margin-right: 10px;

        }

        .join {

            background: #1f3c88;
            color: white;

        }

        .cancel {

            background: #ddd;

        }

        .join:hover {
            opacity: .9;
        }

        .hidden {
            display: none;
        }

        /* Responsive */

        @media(max-width:700px) {

            .header h1 {
                font-size: 1.5rem;
            }
.card{
    margin-bottom: 2%;
}
        }
    </style>

</head>

<body>
    <div class="container">
        <div class="summary">
            <div class="card">
                <h2>03</h2>
                <p>Total Interviews</p>
            </div>
            <div class="card">
                <h2>01</h2>
                <p>Today</p>
            </div>
            <div class="card">
                <h2>02</h2>
                <p>Upcoming</p>
            </div>
        </div>

        <h2 class="section-title">
            Upcoming Interviews
        </h2>
        <!-- Interview 1 -->
        <div class="interview-box">
            <div class="top">
                <div class="company">
                    Tech Solutions Pvt Ltd
                </div>
                <div class="status">
                    Scheduled
                </div>
            </div>
            <div class="details">
                <div class="detail">
                    <b>Date</b>
                    <br>
                    12 July 2026
                </div>
                <div class="detail">
                    <b>Time</b>
                    <br>
                    10:30 AM
                </div>
                <div class="detail">
                    <b>Mode</b>
                    <br>
                    Online
                </div>
                <div class="detail">
                    <b>Interviewer</b>
                    <br>
                    HR Team
                </div>
            </div>

            <div class="actions">
                <button class="join" onclick="joinInterview()">
                    Join Interview
                </button>
            </div>
        </div>


        <!-- Interview 2 -->
        <div class="interview-box">
            <div class="top">
                <div class="company">
                    CodeSphere Company
                </div>
                <div class="status">
                    Waiting
                </div>
            </div>
            <div class="details">
                <div class="detail">
                    <b>Date</b>
                    <br>
                    15 July 2026
                </div>
                <div class="detail">
                    <b>Time</b>
                    <br>
                    2:00 PM
                </div>
                <div class="detail">
                    <b>Mode</b>
                    <br>
                    Offline
                </div>
                <div class="detail">
                    <b>Location</b>
                    <br>
                    Company Office
                </div>
            </div>
            <div class="actions">
                <button class="join">
                    View Details
                </button>
            </div>
        </div>
    </div>

    <script>

        function joinInterview() {
            alert(
                "Redirect to interview page"
            );
        }
    </script>

</body>

</html>
